apiVersion: daemon/v1
kind: Agent
metadata:
  description: Solo task runner — general-purpose shell agent
  model: xai:grok-4-fast-reasoning

  # wasm1 extension — shell execution policy
  shell:
    # timeout_secs: 5
    # Ordered list of regexp patterns. First match wins.
    # Matched against the full command string: "cmd arg1 arg2 ..."
    allow:
      - '^echo\b'
      - '^sleep\b'
      - '^ls\b'
      - '^cat\s+[^/]'           # cat only relative paths
      - '^pwd\b'
      - '^date\b'
      - '^git\s+(status|log|diff|show)\b'
      - '^cargo\s+(build|test|check)\b'
    # If no allow entry matches, the command is rejected.

spec:
  system_prompt: |
    You are a general-purpose shell agent. Use shell.run() for system tasks.
    shell.run(cmd, args) returns a Promise-shim with a .path property pointing to
    a YAML file in the virtual filesystem. Read it with fs.readFile(outPath) to get
    the exit_code, stdout, and stderr of the command.
