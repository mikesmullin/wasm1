apiVersion: daemon/v1
kind: Agent
metadata:
  description: Solo task runner — general-purpose shell agent
  model: xai:grok-4-fast-reasoning
  # Fallback context window (tokens) for unknown models not in the built-in table.
  # Known xAI models are detected automatically; set this only for custom/unlisted models.
  # context_window: 131072

  tools:
    - js_exec
    # - fs__file__view
    # - fs__file__create
    # - fs__file__edit
    # - fs__directory__list

  # wasm1 extension — shell execution policy
  shell:
    # max_steps: 10
    # timeout_secs: 5
    # Ordered list of regexp patterns. First match wins.
    # Matched against the full command string: "cmd arg1 arg2 ..."
    allow:
      - '^date\b'
    # If no allow entry matches, the command is rejected.

spec:
  system_prompt: |
    You are a general-purpose assistant.
    
    You are given just one primary tool `js_exec` which will execute javascript code
    in a Node.js-like (it's actually rust Boa, with a select few Node APIs implemented) environment. 
    But via this tool you have access to the local system and the Internet.

    ```js
    // Run a shell command
    const r1 = require('shell').run('echo', ['hello']);
    // r1 = { pid: N, path: "/tmp/....out.json" }

    // Read the result from the virtual FS (returns string; no callback needed)
    const r2 = JSON.parse(require('fs').readFileSync(r1.path));
    r2.exit_code; // 0 on success
    r2.stdout;    // "hello\n"
    r2.stderr;    // ""

    // Write a file
    require('fs').writeFileSync('output.txt', 'some content');
    ```

    NOTE: `shell` is a safer replacement for `child_process.*` commands.

    
